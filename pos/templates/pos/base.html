<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Grocery POS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/pos/style.css">
</head>
<body>
<main class="container">
    <nav>
        <ul><li><strong>Grocery POS</strong></li></ul>
        <ul>
            <li><a href="{% url 'pos:home' %}">POS</a></li>
            <li><a href="{% url 'pos:products' %}">Products</a></li>
            <li><a href="{% url 'pos:seed' %}">Seed data</a></li>
            <li><a href="/admin/">Admin</a></li>
        </ul>
    </nav>

    {% if messages %}
    <section>
      {% for message in messages %}
      <article class="message {{ message.tags }}">{{ message }}</article>
      {% endfor %}
    </section>
    {% endif %}

    {% block content %}{% endblock %}
</main>
{% block scripts %}{% endblock %}
</body>
</html>
